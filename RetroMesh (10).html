<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050805">
<title>RetroMesh</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
:root{
  --bg:#050805;--s1:#0b100b;--s2:#0e160e;--bdr:#1a301a;
  --g0:#33ff00;--g1:#1fcc00;--g2:#0d6600;--g3:#063300;--g4:#031a00;
  --red:#ff4040;--amb:#ffb300;--txt:#c8e8c8;--dim:#3d5c3d;
  --scan:rgba(51,255,0,.014);
  --top:env(safe-area-inset-top,0px);--bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{position:fixed;inset:0;display:flex;flex-direction:column;font-family:'Share Tech Mono',monospace;color:var(--txt);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px)}

/* ── SHELL ── */
#shell{display:flex;flex-direction:column;height:100%;width:100%;max-width:480px;
  margin:0 auto;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);
  position:relative;z-index:1;overflow:hidden}

/* ── TOPBAR ── */
#topbar{flex-shrink:0;background:var(--s1);border-bottom:2px solid var(--g2);
  padding-top:var(--top);height:calc(var(--top) + 54px);
  display:flex;align-items:center;padding:0 16px;padding-top:var(--top);
  justify-content:space-between;box-shadow:0 0 24px rgba(51,255,0,.08)}
.logo{font-family:'VT323',monospace;font-size:28px;letter-spacing:5px;
  color:var(--g0);text-shadow:0 0 14px var(--g0)}
.conn{display:flex;align-items:center;gap:8px}
#dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .5s}
#dot.on{background:var(--g0);box-shadow:0 0 8px var(--g0);animation:blink 3s infinite}
#dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
#dot.wait{background:var(--amb);box-shadow:0 0 6px var(--amb);animation:blink 1s infinite}
#clabel{font-size:10px;color:var(--dim);letter-spacing:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SCREENS ── */
#screens{flex:1;overflow:hidden;position:relative}
.scr{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg)}
.scr.on{display:flex}

/* ── LOGIN ── */
#s-login{justify-content:center;align-items:center;padding:20px}
.card{width:100%;max-width:360px;border:1px solid var(--g2);background:var(--s1);
  box-shadow:0 0 40px rgba(51,255,0,.06)}
.card-head{background:var(--g0);color:var(--bg);font-family:'VT323',monospace;
  font-size:21px;letter-spacing:3px;padding:11px 16px}
.card-body{padding:20px;display:flex;flex-direction:column;gap:12px}
.tabs{display:flex;border:1px solid var(--g3)}
.tab{flex:1;padding:10px;font-family:'VT323',monospace;font-size:18px;letter-spacing:2px;
  text-align:center;cursor:pointer;color:var(--dim);background:transparent;border:none}
.tab.act{background:var(--g3);color:var(--g0)}
.lbl{font-size:10px;color:var(--g1);letter-spacing:2px;margin-bottom:5px;display:block}
.lbl::before{content:'// ';color:var(--g3)}
input[type=text],input[type=password],input[type=email]{
  width:100%;background:var(--bg);border:1px solid var(--g3);border-bottom-color:var(--g2);
  color:var(--g0);font-family:'Share Tech Mono',monospace;font-size:15px;
  padding:12px 13px;outline:none;caret-color:var(--g0);
  -webkit-appearance:none;border-radius:0;transition:border-color .2s}
input:focus{border-color:var(--g1);box-shadow:0 0 12px rgba(51,255,0,.1)}
input::placeholder{color:var(--dim)}
.errtxt{font-size:11px;color:var(--red);min-height:16px;text-align:center;line-height:1.5}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;
  background:transparent;border:1px solid var(--g1);color:var(--g0);
  font-family:'VT323',monospace;font-size:20px;letter-spacing:2px;
  padding:14px;cursor:pointer;width:100%;min-height:52px;
  transition:background .15s;-webkit-appearance:none;user-select:none}
.btn:active{background:rgba(51,255,0,.1)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:active{background:rgba(255,64,64,.1)}
.hint-txt{font-size:10px;color:var(--dim);text-align:center;line-height:1.8}
.spin{width:18px;height:18px;border:2px solid var(--g3);border-top-color:var(--g0);
  border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── CHATS LIST ── */
.shead{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bdr);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;min-height:56px}
.stitle{font-family:'VT323',monospace;font-size:26px;color:var(--g0);letter-spacing:3px}
.list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative}
.list-body::-webkit-scrollbar{display:none}
#empty{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;pointer-events:none;color:var(--dim)}
#empty.hide{display:none}
.e-ico{font-family:'VT323',monospace;font-size:72px;color:var(--g3);line-height:1}
.e-txt{font-size:12px;letter-spacing:2px;text-align:center;line-height:2.2}
.crow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bdr);
  cursor:pointer;gap:12px;min-height:70px;transition:background .1s}
.crow:active{background:rgba(51,255,0,.05)}
.av{width:44px;height:44px;flex-shrink:0;border:1px solid var(--g2);background:var(--g4);
  display:flex;align-items:center;justify-content:center;
  font-family:'VT323',monospace;font-size:22px;color:var(--g0)}
.ci{flex:1;min-width:0}
.cn{font-size:14px;color:var(--txt);letter-spacing:1px}
.cp{font-size:11px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:var(--g0);color:var(--bg);font-size:11px;font-weight:bold;
  min-width:22px;height:22px;border-radius:2px;display:flex;align-items:center;
  justify-content:center;padding:0 5px;flex-shrink:0}

/* ── CHAT ROW MENU ── */
.crow{position:relative}
.c-dots{width:36px;height:100%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:18px;color:var(--dim);cursor:pointer;
  border:none;background:transparent;padding:0;z-index:2;letter-spacing:1px}
.c-dots:active{color:var(--g0)}
.c-menu{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:var(--s1);border:1px solid var(--g2);z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.7);display:none;min-width:160px}
.c-menu.open{display:block}
.c-menu-item{display:flex;align-items:center;gap:10px;padding:13px 16px;
  font-size:13px;letter-spacing:1px;cursor:pointer;color:var(--red);
  border:none;background:transparent;width:100%;text-align:left}
.c-menu-item:active{background:rgba(255,64,64,.08)}

/* ── MESSAGE SELECTION ── */
.mg{cursor:pointer}
.mg.selected .bub,.mg.selected .img-wrap,.mg.selected .file-bub,.mg.selected .voice-bub{
  outline:2px solid var(--g0);outline-offset:2px}
.mg.selected::before{content:'✓';position:absolute;left:-24px;top:50%;
  transform:translateY(-50%);color:var(--g0);font-size:16px;font-weight:bold}
.mg{position:relative}

/* ── SWIPE TO REPLY ── */
.mg-inner{
  display:flex;flex-direction:column;gap:3px;
  transition:transform .22s cubic-bezier(.25,.46,.45,.94);
  will-change:transform;
  touch-action:pan-y;
}
.mg-inner.swiping{transition:none}
.reply-arrow{
  position:absolute;top:50%;
  width:34px;height:34px;border-radius:50%;
  background:var(--g2);border:1px solid var(--g1);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--g0);
  opacity:0;transform:translateY(-50%) scale(.5);
  transition:opacity .15s,transform .15s;
  pointer-events:none;
}
.mg.me .reply-arrow{left:-46px}
.mg.them .reply-arrow{right:-46px;transform:translateY(-50%) scale(.5) scaleX(-1)}
.mg.me .reply-arrow.show,.mg.them .reply-arrow.show{
  opacity:1;transform:translateY(-50%) scale(1)
}
.mg.them .reply-arrow.show{transform:translateY(-50%) scale(1) scaleX(-1)}

/* ── REPLY QUOTE inside bubble ── */
.reply-quote{
  border-left:3px solid var(--g0);
  padding:4px 8px;margin-bottom:6px;
  background:rgba(51,255,0,.07);
  border-radius:2px;max-width:100%;
}
.me .reply-quote{border-left-color:var(--g1)}
.rq-author{font-size:10px;color:var(--g0);letter-spacing:1px;margin-bottom:2px;font-weight:bold}
.me .rq-author{color:var(--g1)}
.rq-text{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* ── REPLY BAR (above ibar) ── */
#reply-bar{
  flex-shrink:0;background:var(--s2);border-top:1px solid var(--g2);
  padding:8px 12px;display:none;align-items:center;gap:10px;
}
#reply-bar.show{display:flex}
.rb-line{width:3px;height:36px;background:var(--g0);border-radius:2px;flex-shrink:0}
.rb-info{flex:1;min-width:0}
.rb-author{font-size:10px;color:var(--g0);letter-spacing:1px;margin-bottom:2px}
.rb-text{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{width:30px;height:30px;flex-shrink:0;border:none;background:transparent;
  color:var(--dim);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rb-close:active{color:var(--g0)}

/* ── DELETE TOOLBAR (top of chat) ── */
#del-toolbar{position:absolute;top:0;left:0;right:0;z-index:20;
  background:var(--s1);border-bottom:2px solid var(--red);
  display:none;align-items:center;padding:0 14px;gap:12px;
  height:56px;box-shadow:0 2px 16px rgba(255,64,64,.15)}
#del-toolbar.show{display:flex}
#del-count{font-family:'VT323',monospace;font-size:22px;color:var(--red);letter-spacing:2px;flex:1}
.del-btn{border:1px solid var(--red);background:transparent;color:var(--red);
  font-family:'VT323',monospace;font-size:16px;letter-spacing:1px;
  padding:8px 14px;cursor:pointer;transition:background .15s;white-space:nowrap}
.del-btn:active{background:rgba(255,64,64,.12)}
.del-cancel{border-color:var(--bdr);color:var(--dim)}
.del-cancel:active{background:rgba(255,255,255,.04)}

#fab{position:absolute;bottom:calc(16px + var(--bot));left:16px;
  width:56px;height:56px;background:var(--g0);border:none;color:var(--bg);
  font-size:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:2px;box-shadow:0 4px 20px rgba(51,255,0,.35);
  font-family:'VT323',monospace;transition:transform .15s;z-index:10}
#fab:active{transform:scale(.9)}

/* ── BOTTOM NAV ── */
#bnav{flex-shrink:0;background:var(--s1);border-top:1px solid var(--bdr);
  padding-bottom:var(--bot);display:none}
.navrow{display:flex}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 8px;min-height:56px;cursor:pointer;border:none;
  background:transparent;color:var(--dim);font-size:10px;letter-spacing:1.5px;
  font-family:'Share Tech Mono',monospace}
.nicon{font-size:24px;line-height:1;transition:color .2s}
.ntab.act,.ntab.act .nicon{color:var(--g0)}
.ntab.act .nicon{text-shadow:0 0 10px var(--g0)}
.ntab:active{background:rgba(51,255,0,.06)}

/* ── CHAT VIEW ── */
#chat-hdr{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:10px 14px;gap:12px;min-height:60px}
.backbtn{width:40px;height:40px;flex-shrink:0;border:1px solid var(--g3);
  background:transparent;color:var(--g1);font-size:20px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.backbtn:active{background:rgba(51,255,0,.1)}
.c-av{width:38px;height:38px;flex-shrink:0;border:1px solid var(--g2);background:var(--g4);
  display:flex;align-items:center;justify-content:center;
  font-family:'VT323',monospace;font-size:18px;color:var(--g0)}
.c-info{flex:1;min-width:0}
.c-name{font-family:'VT323',monospace;font-size:20px;color:var(--g0);letter-spacing:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 8px rgba(51,255,0,.3)}
.c-sub{font-size:10px;color:var(--dim);letter-spacing:1px}

/* ── MESSAGES ── */
#msglist{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;
  gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--g3) transparent}
#msglist::-webkit-scrollbar{width:3px}
#msglist::-webkit-scrollbar-thumb{background:var(--g3)}
.mg{display:flex;flex-direction:column;max-width:84%;gap:3px;
  animation:pop .18s cubic-bezier(.34,1.56,.64,1)}
.mg.me{align-self:flex-end;align-items:flex-end}
.mg.them{align-self:flex-start;align-items:flex-start}
@keyframes pop{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}

/* text bubble */
.bub{padding:8px 13px;font-size:14px;line-height:1.5;word-break:break-word}
.me .bub{background:var(--g3);border:1px solid var(--g2);color:var(--g0);border-radius:12px 2px 12px 12px}
.them .bub{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:2px 12px 12px 12px}
.meta{font-size:10px;color:var(--dim);padding:0 3px}

/* image bubble */
.img-wrap{padding:4px;cursor:pointer;border-radius:4px;overflow:hidden;max-width:240px}
.me .img-wrap{border:1px solid var(--g2)}
.them .img-wrap{border:1px solid var(--bdr)}
.img-wrap img{display:block;width:100%;max-width:240px;max-height:300px;object-fit:cover;border-radius:2px}
.img-wrap:active{opacity:.8}

/* file bubble */
.file-bub{display:flex;align-items:center;gap:10px;padding:10px 14px;
  min-width:160px;max-width:240px;cursor:pointer;text-decoration:none}
.me .file-bub{background:var(--g3);border:1px solid var(--g2);color:var(--g0);border-radius:12px 2px 12px 12px}
.them .file-bub{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:2px 12px 12px 12px}
.file-bub:active{opacity:.8}
.f-ico{font-size:28px;line-height:1;flex-shrink:0}
.f-info{flex:1;min-width:0}
.f-name{font-size:12px;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-size{font-size:10px;opacity:.6;margin-top:2px}

/* voice bubble */
.voice-bub{display:flex;align-items:center;gap:10px;padding:10px 14px;min-width:200px}
.me .voice-bub{background:var(--g3);border:1px solid var(--g2);color:var(--g0);border-radius:12px 2px 12px 12px}
.them .voice-bub{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-radius:2px 12px 12px 12px}
.vbtn{width:36px;height:36px;flex-shrink:0;border:1px solid currentColor;border-radius:50%;
  background:transparent;color:inherit;font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.vbtn:active{background:rgba(255,255,255,.15)}
.vwave{flex:1;display:flex;align-items:center;gap:2px;height:26px}
.vwave b{display:inline-block;width:3px;border-radius:2px;background:currentColor;opacity:.45;flex-shrink:0}
.vdur{font-size:11px;opacity:.7;white-space:nowrap;min-width:34px;text-align:right}

/* ── INPUT BAR ── */
#ibar{flex-shrink:0;border-top:1px solid var(--bdr);background:var(--s1);
  padding:8px 10px calc(8px + var(--bot));display:flex;align-items:center;gap:6px;
  position:relative}
#ibar-prog{position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--g3);display:none;overflow:hidden}
#ibar-prog.show{display:block}
#ibar-fill{height:100%;background:var(--g0);width:0;transition:width .25s}
#ibar-rec{position:absolute;inset:0;background:var(--s1);
  display:none;align-items:center;justify-content:center;gap:12px;z-index:4;
  font-family:'VT323',monospace;font-size:17px;color:var(--red);letter-spacing:2px}
#ibar-rec.show{display:flex}
.rec-dot{width:9px;height:9px;border-radius:50%;background:var(--red);
  animation:blink .8s infinite;flex-shrink:0}

.ibtn{width:44px;height:44px;flex-shrink:0;background:transparent;
  border:1px solid var(--g3);color:var(--g1);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  -webkit-appearance:none;user-select:none}
.ibtn:active{background:rgba(51,255,0,.1)}
.ibtn.busy{border-color:var(--amb);color:var(--amb);animation:blink 1s infinite}
.ibtn.rec{border-color:var(--red);color:var(--red);background:rgba(255,64,64,.08);animation:blink .8s infinite}
.ibtn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;width:100%;height:100%}

#msginput{flex:1;height:44px;background:var(--bg);border:1px solid var(--g3);
  border-bottom-color:var(--g2);color:var(--g0);font-family:'Share Tech Mono',monospace;
  font-size:15px;padding:10px 12px;outline:none;caret-color:var(--g0);
  -webkit-appearance:none;border-radius:0;transition:border-color .2s}
#msginput:focus{border-color:var(--g1);box-shadow:0 0 10px rgba(51,255,0,.1)}
#msginput::placeholder{color:var(--dim)}
#sendbtn{width:44px;height:44px;flex-shrink:0;background:var(--g0);border:none;
  color:var(--bg);font-size:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-family:'VT323',monospace;transition:opacity .15s,transform .1s}
#sendbtn:active{opacity:.75;transform:scale(.92)}

/* ── PROFILE ── */
#s-profile{overflow-y:auto}
.prof-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.prof-hero{display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:24px 20px;border:1px solid var(--bdr);background:var(--s1)}
.bigav{width:76px;height:76px;border:2px solid var(--g1);background:var(--g4);
  display:flex;align-items:center;justify-content:center;
  font-family:'VT323',monospace;font-size:40px;color:var(--g0)}
.pname-big{font-family:'VT323',monospace;font-size:28px;color:var(--g0);letter-spacing:3px}
.psub{font-size:10px;color:var(--dim);letter-spacing:2px}
.irow{display:flex;align-items:center;border:1px solid var(--bdr);
  background:var(--s1);padding:13px 16px;gap:10px}
.ikey{font-size:10px;color:var(--dim);letter-spacing:2px;width:70px;flex-shrink:0}
.ival{font-size:12px;color:var(--g1);flex:1;word-break:break-all}
.cpybtn{font-size:15px;color:var(--dim);background:transparent;border:none;cursor:pointer;padding:6px 10px}
.cpybtn:active{color:var(--g0)}

/* ── MODAL ── */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:500;
  display:none;align-items:flex-end}
#modal.open{display:flex}
.msheet{width:100%;max-width:480px;margin:0 auto;background:var(--s1);
  border-top:2px solid var(--g1);padding:20px 20px calc(20px + var(--bot));
  display:flex;flex-direction:column;gap:14px;
  box-shadow:0 -10px 40px rgba(51,255,0,.1);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
#modal.open .msheet{transform:translateY(0)}
.mtitle{font-family:'VT323',monospace;font-size:22px;color:var(--g0);letter-spacing:3px}
.mrow{display:flex;gap:10px}
#mst{font-size:12px;min-height:20px;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.5px}
#mst.ok{color:var(--g0)}#mst.err{color:var(--red)}#mst.srch{color:var(--amb)}

/* ── LIGHTBOX ── */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:8000;
  display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lb.open{display:flex}

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════
//  RETROMESH — файлы и голос через base64 в Realtime DB
// ══════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyBsi-K-yqcLw231KfqFqMd3XxrJrxztFbM",
  authDomain:"retromeshchat.firebaseapp.com",
  databaseURL:"https://retromeshchat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"retromeshchat",
  storageBucket:"retromeshchat.firebasestorage.app",
  messagingSenderId:"239709570570",
  appId:"1:239709570570:web:c22ce12fbf1737379fc1f3"
});
const auth = firebase.auth();
const db   = firebase.database();

// ── state ──
let ME_UID='', ME_NICK='', CUR_PEER='', CUR_CH='';
let contacts=[], msgCache={}, listeners={}, unread={};
// voice
let mediaRec=null, recChunks=[], recSec=0, recTimer=null;

// ── helpers ──
const $   = id => document.getElementById(id);
const ini = s  => (s||'?')[0].toUpperCase();
const chid= (a,b) => [a,b].sort().join('~~');
const fmtT= ts => { const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0') };
const fmtD= s  => { const m=Math.floor(s/60),x=Math.round(s%60); return m+':'+(x<10?'0':'')+x };
const esc = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtSz= b => b<1024?b+' Б':b<1048576?(b/1024).toFixed(1)+' КБ':(b/1048576).toFixed(1)+' МБ';

function toast(msg,dur=3000){
  const e=$('toast');e.textContent=msg;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),dur);
}
function setConn(st){
  const d=$('dot'),l=$('clabel');
  if(st==='on'){d.className='on';l.textContent='ONLINE';l.style.color='var(--g1)'}
  else if(st==='off'){d.className='off';l.textContent='OFFLINE';l.style.color='var(--red)'}
  else{d.className='wait';l.textContent='SYNC…';l.style.color='var(--amb)'}
}
function setErr(m){$('lerr').textContent=m}
function setBusy(on){$('lbtn-t').style.display=on?'none':'';$('lspin').style.display=on?'block':'none';$('lbtn').disabled=on}
function setProg(pct){
  if(pct==null){$('ibar-prog').classList.remove('show');$('ibar-fill').style.width='0';return}
  $('ibar-prog').classList.add('show');$('ibar-fill').style.width=pct+'%';
}

// ── navigation ──
let curScr='login';
function goTo(scr){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  $('s-'+scr).classList.add('on'); curScr=scr;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('act',t.dataset.s===scr));
  $('bnav').style.display=(scr==='login'||scr==='chat')?'none':'block';
}
document.querySelectorAll('.ntab').forEach(t=>t.onclick=()=>goTo(t.dataset.s));

// ── tabs ──
let curTab='l';
function switchTab(tab){
  curTab=tab;
  $('form-l').style.display=tab==='l'?'':'none';
  $('form-r').style.display=tab==='r'?'':'none';
  $('tab-l').classList.toggle('act',tab==='l');
  $('tab-r').classList.toggle('act',tab==='r');
  $('lbtn-t').textContent=tab==='l'?'[ ВОЙТИ ]':'[ ЗАРЕГИСТРИРОВАТЬСЯ ]';
  $('lhint').textContent=tab==='l'?'Нет аккаунта? Перейди на РЕГИСТРАЦИЯ':'Есть аккаунт? Перейди на ВХОД';
  setErr('');
}

// ── enter handling ──
['l-pw','r-pw'].forEach(id=>$(id).onkeydown=e=>{if(e.key==='Enter')doAuth()});
$('r-em').onkeydown=e=>{if(e.key==='Enter')$('r-pw').focus()};
$('r-nm').onkeydown=e=>{if(e.key==='Enter')$('r-em').focus()};
$('l-em').onkeydown=e=>{if(e.key==='Enter')$('l-pw').focus()};
$('lbtn').onclick=doAuth;

// ════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════
function doAuth(){ setErr(''); curTab==='l'?doLogin():doRegister() }

function doLogin(){
  const em=$('l-em').value.trim(), pw=$('l-pw').value;
  if(!em){setErr('⚠ Введите e-mail');return}
  if(!pw){setErr('⚠ Введите пароль');return}
  setBusy(true);
  auth.signInWithEmailAndPassword(em,pw)
    .then(cr=>db.ref('uids/'+cr.user.uid).once('value').then(s=>{
      const nick=s.val(); if(!nick)throw new Error('Профиль не найден');
      enterApp(cr.user.uid,nick,cr.user.email);
    }))
    .catch(e=>{setBusy(false);setErr(authErr(e))});
}

function doRegister(){
  const nick=$('r-nm').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const em=$('r-em').value.trim(), pw=$('r-pw').value;
  if(nick.length<2){setErr('⚠ Ник: минимум 2 символа');return}
  if(!em){setErr('⚠ Введите e-mail');return}
  if(pw.length<6){setErr('⚠ Пароль: минимум 6 символов');return}
  setBusy(true);
  // создаём Auth первым (пользователь сразу залогинен → auth!=null)
  auth.createUserWithEmailAndPassword(em,pw)
    .then(cr=>{
      const uid=cr.user.uid;
      return db.ref('users/'+nick).once('value').then(snap=>{
        if(snap.exists()){
          return cr.user.delete().then(()=>{setBusy(false);setErr('⚠ Ник @'+nick+' уже занят')});
        }
        const upd={};
        upd['users/'+nick]={nick,uid,email:em,created:Date.now()};
        upd['uids/'+uid]=nick;
        return db.ref().update(upd).then(()=>enterApp(uid,nick,em));
      });
    })
    .catch(e=>{setBusy(false);setErr(authErr(e))});
}

function authErr(e){
  const m={
    'auth/user-not-found':'⚠ Пользователь не найден',
    'auth/wrong-password':'⚠ Неверный пароль',
    'auth/invalid-email':'⚠ Неверный e-mail',
    'auth/invalid-credential':'⚠ Неверный e-mail или пароль',
    'auth/too-many-requests':'⚠ Слишком много попыток',
    'auth/email-already-in-use':'⚠ E-mail уже используется',
    'auth/weak-password':'⚠ Пароль слишком простой',
    'auth/network-request-failed':'⚠ Нет соединения',
  };
  return m[e.code]||'⚠ '+e.message;
}

// ════════════════════════════════════════
//  ENTER APP
// ════════════════════════════════════════
function enterApp(uid,nick,email){
  ME_UID=uid; ME_NICK=nick;
  setBusy(false); setErr('');
  $('pav').textContent=ini(nick);
  $('pname').textContent='@'+nick.toUpperCase();
  $('p-nick').textContent='@'+nick;
  $('p-email').textContent=email||'';
  contacts=[]; msgCache={}; listeners={}; unread={};
  loadContacts();
  goTo('chats');
  $('bnav').style.display='block';
  toast('✓ @'+nick.toUpperCase(),2000);
}

// ════════════════════════════════════════
//  CONTACTS
// ════════════════════════════════════════
function loadContacts(){
  db.ref('contacts/'+ME_UID).on('child_added',snap=>{
    const p=snap.val(); if(!p||contacts.includes(p))return;
    contacts.push(p);
    if(!msgCache[chid(ME_NICK,p)])msgCache[chid(ME_NICK,p)]=[];
    listenMsgs(p); renderList();
  });
}

// ════════════════════════════════════════
//  CHAT LIST
// ════════════════════════════════════════
function renderList(){
  const list=$('chat-list'),empty=$('empty');
  list.innerHTML='';
  if(!contacts.length){empty.classList.remove('hide');return}
  empty.classList.add('hide');
  contacts.forEach(peer=>{
    const ch=chid(ME_NICK,peer),msgs=msgCache[ch]||[],last=msgs[msgs.length-1];
    const prev=last ? prevText(last) : '— нет сообщений —';
    const row=document.createElement('div');
    row.className='crow';
    const safePeer=peer.replace(/'/g,"\\'");
    row.innerHTML=
      '<div class="av" data-open="1">'+ini(peer)+'</div>'+
      '<div class="ci" data-open="1"><div class="cn">@'+esc(peer)+'</div>'+
      '<div class="cp" id="prev_'+peer+'">'+prev+'</div></div>'+
      (unread[peer]?'<div class="badge">'+unread[peer]+'</div>':'')+
      '<button class="c-dots" onclick="toggleChatMenu(event,\''+safePeer+'\')">&#8943;</button>'+
      '<div class="c-menu" id="cmenu_'+peer+'">'+
        '<button class="c-menu-item" onclick="confirmDeleteChat(\''+safePeer+'\')">&#128465; Удалить чат</button>'+
      '</div>';
    row.querySelectorAll('[data-open]').forEach(el=>{ el.style.cursor='pointer'; el.onclick=()=>openChat(peer); });
    list.appendChild(row);
  });
}
function prevText(m){
  if(m.type==='image')return'📷 Фото';
  if(m.type==='audio')return'🎤 Голосовое';
  if(m.type==='file')return'📎 '+(m.fname||'Файл');
  return esc(m.text||'').slice(0,40);
}

// ════════════════════════════════════════
//  LISTEN MESSAGES  ← главный слушатель
// ════════════════════════════════════════
function listenMsgs(peer){
  const ch=chid(ME_NICK,peer);
  if(listeners[ch])return;
  if(!msgCache[ch])msgCache[ch]=[];
  listeners[ch]=true;

  db.ref('chats/'+ch+'/msgs').orderByChild('ts').on('child_added',snap=>{
    const d=snap.val(); if(!d)return;
    const id=snap.key;
    if(msgCache[ch].some(m=>m.id===id))return;

    // ── ЕДИНСТВЕННЫЙ формат сообщения ──
    const msg={
      id,
      from : d.from  || '',
      type : d.type  || 'text',
      text : d.text  || '',
      data : d.data  || '',
      fname: d.fname || '',
      fsize: d.fsize || 0,
      dur  : d.dur   || 0,
      replyTo: d.replyTo || null,
      ts   : d.ts    || 0,
    };

    msgCache[ch].push(msg);
    msgCache[ch].sort((a,b)=>a.ts-b.ts);

    const prev=$('prev_'+peer);
    if(prev)prev.textContent=prevText(msg);

    if(CUR_PEER===peer){
      appendMsg(msg);
    } else if(msg.from!==ME_NICK){
      unread[peer]=(unread[peer]||0)+1;
      renderList();
    }
  });
}

// ════════════════════════════════════════
//  OPEN CHAT
// ════════════════════════════════════════
function openChat(peer){
  cancelSelect(); cancelReply();
  CUR_PEER=peer; CUR_CH=chid(ME_NICK,peer); unread[peer]=0;
  $('c-av').textContent=ini(peer);
  $('c-name').textContent='@'+peer;
  const ml=$('msglist'); ml.innerHTML='';
  (msgCache[CUR_CH]||[]).forEach(m=>appendMsg(m,false));
  ml.scrollTop=ml.scrollHeight;
  goTo('chat');
  setTimeout(()=>$('msginput').focus(),380);
}

// ════════════════════════════════════════
//  RENDER MESSAGE
// ════════════════════════════════════════
function appendMsg(msg,scroll=true){
  const isMe=msg.from===ME_NICK;
  const g=document.createElement('div');
  g.className='mg '+(isMe?'me':'them');
  g.dataset.id=msg.id;

  // Стрелка ответа
  const arrow=document.createElement('div');
  arrow.className='reply-arrow';
  arrow.innerHTML='↩';

  // Внутренний блок (свайпается)
  const inner=document.createElement('div');
  inner.className='mg-inner';

  // Цитата если это ответ
  if(msg.replyTo){
    const qel=document.createElement('div');
    qel.className='reply-quote';
    qel.innerHTML=`<div class="rq-author">${esc(msg.replyTo.from||'')}</div>
      <div class="rq-text">${esc(replyPreview(msg.replyTo))}</div>`;
    // Клик по цитате — прокрутить к оригиналу
    qel.style.cursor='pointer';
    qel.onclick=e=>{ e.stopPropagation(); scrollToMsg(msg.replyTo.id); };
    inner.appendChild(qel);
  }

  // Пузырь + мета
  const bubWrap=document.createElement('div');
  bubWrap.innerHTML=buildBub(msg)+`<div class="meta">${fmtT(msg.ts)}</div>`;
  while(bubWrap.firstChild) inner.appendChild(bubWrap.firstChild);

  g.appendChild(arrow);
  g.appendChild(inner);

  // ── СВАЙП ВПРАВО → ОТВЕТИТЬ ──
  let sx=0,sy=0,dx=0,swiping=false,swipeTriggered=false;
  const THRESHOLD=60;

  inner.addEventListener('pointerdown',e=>{
    if(selectMode)return;
    sx=e.clientX; sy=e.clientY; dx=0;
    swiping=false; swipeTriggered=false;
  },{passive:true});

  inner.addEventListener('pointermove',e=>{
    if(selectMode)return;
    const cx=e.clientX,cy=e.clientY;
    const adx=Math.abs(cx-sx),ady=Math.abs(cy-sy);
    // Только горизонтальный свайп вправо
    if(!swiping){
      if(adx>8&&adx>ady){ swiping=true; inner.classList.add('swiping'); }
      else if(ady>8){ return; }
    }
    if(!swiping)return;
    dx=Math.max(0,cx-sx); // только вправо
    // Нелинейное сопротивление
    const pull=Math.min(dx,THRESHOLD*1.4);
    const t=pull<THRESHOLD ? pull : THRESHOLD+(pull-THRESHOLD)*.25;
    inner.style.transform=`translateX(${t}px)`;
    // Показываем стрелку при достижении порога
    if(dx>=THRESHOLD&&!swipeTriggered){
      arrow.classList.add('show');
    } else if(dx<THRESHOLD){
      arrow.classList.remove('show');
    }
  },{passive:true});

  function endSwipe(){
    if(!swiping)return;
    swiping=false;
    inner.classList.remove('swiping');
    inner.style.transform='';
    if(dx>=THRESHOLD&&!swipeTriggered){
      swipeTriggered=true;
      arrow.classList.remove('show');
      // Маленький отскок
      inner.style.transition='transform .18s cubic-bezier(.34,1.56,.64,1)';
      inner.style.transform='translateX(12px)';
      setTimeout(()=>{inner.style.transform='';setTimeout(()=>{inner.style.transition='';},200)},120);
      // Активируем ответ
      setReply(msg);
    } else {
      arrow.classList.remove('show');
    }
    dx=0;
  }

  inner.addEventListener('pointerup',endSwipe,{passive:true});
  inner.addEventListener('pointercancel',endSwipe,{passive:true});

  // ── ДОЛГОЕ НАЖАТИЕ → ВЫДЕЛЕНИЕ ──
  let pressTimer=null;
  inner.addEventListener('pointerdown',e=>{
    pressTimer=setTimeout(()=>{ pressTimer=null; if(!swiping)toggleMsgSelect(msg.id,g); },450);
  },{passive:true});
  inner.addEventListener('pointerup',()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} },{passive:true});
  inner.addEventListener('pointercancel',()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} },{passive:true});

  // В режиме выделения — клик переключает
  g.addEventListener('click',e=>{
    if(selectMode){ e.preventDefault(); e.stopPropagation(); toggleMsgSelect(msg.id,g); }
  });

  $('msglist').appendChild(g);
  if(scroll)$('msglist').scrollTop=$('msglist').scrollHeight;
}

function buildBub(msg){
  switch(msg.type){

    case 'image':
      if(!msg.data)return`<div class="bub">📷 [нет данных]</div>`;
      return`<div class="img-wrap" onclick="openLb('${encodeURIComponent(msg.data)}')">
        <img src="${msg.data}" alt="фото" loading="lazy">
      </div>`;

    case 'audio':
      if(!msg.data)return`<div class="bub">🎤 [нет данных]</div>`;
      const uid='a'+Math.random().toString(36).slice(2,7);
      const dur=msg.dur?fmtD(msg.dur):'—';
      const bars=Array.from({length:18},()=>`<b style="height:${6+Math.random()*14|0}px"></b>`).join('');
      return`<div class="voice-bub">
        <button class="vbtn" onclick="playAudio(this,'${encodeURIComponent(msg.data)}','${uid}')">▶</button>
        <div class="vwave">${bars}</div>
        <div class="vdur" id="vd_${uid}">${dur}</div>
        <audio id="va_${uid}" preload="none" style="display:none"></audio>
      </div>`;

    case 'file':
      if(!msg.data)return`<div class="bub">📎 [нет данных]</div>`;
      return`<a class="file-bub" onclick="dlFile('${encodeURIComponent(msg.data)}','${esc(msg.fname||'file')}')" href="javascript:void(0)">
        <div class="f-ico">📄</div>
        <div class="f-info">
          <div class="f-name">${esc(msg.fname||'файл')}</div>
          <div class="f-size">${msg.fsize?fmtSz(msg.fsize):''} · нажми чтобы скачать</div>
        </div>
      </a>`;

    default:
      return`<div class="bub">${esc(msg.text)}</div>`;
  }
}

// ── Audio player ──
const audioState={};
function playAudio(btn,encoded,uid){
  const aud=$('va_'+uid); if(!aud)return;
  // если уже играет — пауза
  if(audioState[uid]&&!aud.paused){aud.pause();btn.textContent='▶';return}
  // подставляем src только один раз
  if(!aud._loaded){
    try{
      const b64=decodeURIComponent(encoded);
      const arr=b64.split(','),mime=(arr[0].match(/:(.*?);/)||[])[1]||'audio/webm';
      const bin=atob(arr[1]);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      aud.src=URL.createObjectURL(new Blob([bytes],{type:mime}));
      aud._loaded=true;
    }catch(e){toast('⚠ Ошибка воспроизведения');return}
  }
  btn.textContent='⏸'; audioState[uid]=true;
  aud.play().catch(()=>{btn.textContent='▶'});
  aud.onended=()=>{btn.textContent='▶';audioState[uid]=false};
  aud.ontimeupdate=()=>{
    const d=$('vd_'+uid);
    if(d&&aud.duration)d.textContent=fmtD(Math.max(0,aud.duration-aud.currentTime));
  };
}

// ── File download ──

    const b64=decodeURIComponent(encoded);
    const a=document.createElement('a');
    a.href=b64; a.download=fname; a.click();

//  REPLY
// ════════════════════════════════════════
let replyMsg=null; // {id, from, type, text, data, fname}

function replyPreview(m){
  if(!m)return'';
  if(m.type==='image')return'📷 Фото';
  if(m.type==='audio')return'🎤 Голосовое';
  if(m.type==='file')return'📎 '+(m.fname||'Файл');
  return(m.text||'').slice(0,60);
}

function setReply(msg){
  replyMsg={id:msg.id,from:msg.from,type:msg.type,text:msg.text,data:msg.data,fname:msg.fname};
  $('rb-author').textContent=msg.from===ME_NICK?'Вы':'@'+msg.from;
  $('rb-text').textContent=replyPreview(msg);
  $('reply-bar').classList.add('show');
  $('msginput').focus();
}

function cancelReply(){
  replyMsg=null;
  $('reply-bar').classList.remove('show');
}

function scrollToMsg(id){

  if(!el)return;

  // Мигание
  const inner=el.querySelector('.mg-inner');

//  SEND TEXT
// ════════════════════════════════════════
$('sendbtn').onclick=sendText;
$('msginput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText()}};
function sendText(){
  const text=$('msginput').value.trim(); if(!text||!CUR_PEER)return;
  $('msginput').value=''; $('msginput').focus();
  const payload={from:ME_NICK,type:'text',text,ts:Date.now()};

// ════════════════════════════════════════
//  SEND FILE / IMAGE  📎
// ════════════════════════════════════════
$('file-inp').onchange=function(){
  const file=this.files[0]; this.value='';
  if(!file)return;
  if(!CUR_PEER){toast('⚠ Сначала откройте чат');return}

  const isImage=file.type.startsWith('image/');
  if(isImage) sendImage(file);
  else sendFile(file);
};

function sendImage(file){
  $('filebtn').classList.add('busy'); setProg(10);
  const reader=new FileReader();
  reader.onload=ev=>{
    setProg(35);
    const img=new Image();
    img.onload=()=>{
      // Сжимаем до макс 900px
      const MAX=900; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX}else{w=Math.round(w*MAX/h);h=MAX}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      setProg(65);
      let b64=c.toDataURL('image/jpeg',0.75);
      // Если всё равно > 700КБ — сжать сильнее
      if(b64.length>700*1024)b64=c.toDataURL('image/jpeg',0.45);
      if(b64.length>900*1024){setProg(null);$('filebtn').classList.remove('busy');toast('⚠ Изображение слишком большое');return}
      setProg(85);
      pushMsg({from:ME_NICK,type:'image',text:'📷 Фото',data:b64,ts:Date.now(),...(replyMsg?{replyTo:replyMsg}:{})})
        .then(()=>{setProg(null);$('filebtn').classList.remove('busy');cancelReply();})
        .catch(e=>{setProg(null);$('filebtn').classList.remove('busy');toast('⚠ '+e.message)});
    };
    img.onerror=()=>{setProg(null);$('filebtn').classList.remove('busy');toast('⚠ Не удалось прочитать изображение')};
    img.src=ev.target.result;
  };
  reader.onerror=()=>{setProg(null);$('filebtn').classList.remove('busy');toast('⚠ Ошибка чтения файла')};
  reader.readAsDataURL(file);
}

function sendFile(file){
  // Лимит: 500 КБ для файлов (base64 ~700КБ → ≤ 900КБ лимит Firebase)
  if(file.size>500*1024){toast('⚠ Файл слишком большой (макс 500 КБ)');return}
  $('filebtn').classList.add('busy'); setProg(20);
  const reader=new FileReader();
  reader.onload=ev=>{
    setProg(75);
    pushMsg({from:ME_NICK,type:'file',text:'📎 Файл',data:ev.target.result,
      fname:file.name,fsize:file.size,ts:Date.now(),...(replyMsg?{replyTo:replyMsg}:{})})
      .then(()=>{setProg(null);$('filebtn').classList.remove('busy');cancelReply();})
      .catch(e=>{setProg(null);$('filebtn').classList.remove('busy');toast('⚠ '+e.message)});
  };
  reader.onerror=()=>{setProg(null);$('filebtn').classList.remove('busy');toast('⚠ Ошибка чтения файла')};
  reader.readAsDataURL(file);
}

// ════════════════════════════════════════
//  VOICE  🎤
// ════════════════════════════════════════
function toggleVoice(){
  if(mediaRec&&mediaRec.state==='recording'){stopRec();return}
  if(!CUR_PEER){toast('⚠ Сначала откройте чат');return}
  startRec();
}

async function startRec(){
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false})}
  catch(e){toast(e.name==='NotAllowedError'?'⚠ Разрешите доступ к микрофону':'⚠ Микрофон недоступен');return}

  recChunks=[]; recSec=0;
  const mimes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
  mediaRec.ondataavailable=e=>{if(e.data&&e.data.size>0)recChunks.push(e.data)};
  mediaRec.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    clearInterval(recTimer);
    $('voicebtn').classList.remove('rec');
    $('ibar-rec').classList.remove('show');
    finishRec(mime||mediaRec.mimeType||'audio/webm');
  };
  mediaRec.start(100);
  recSec=0;
  $('rec-t').textContent=fmtD(0);
  $('ibar-rec').classList.add('show');
  $('voicebtn').classList.add('rec');
  recTimer=setInterval(()=>{recSec++;$('rec-t').textContent=fmtD(recSec);if(recSec>=120)stopRec()},1000);
}

function stopRec(){
  if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();
}

function finishRec(mime){
  if(!recChunks.length){toast('⚠ Запись пустая');return}
  const dur=recSec;
  const blob=new Blob(recChunks,{type:mime});
  $('voicebtn').classList.add('busy');
  const reader=new FileReader();
  reader.onload=ev=>{
    const b64=ev.target.result;
    if(b64.length>700*1024){$('voicebtn').classList.remove('busy');toast('⚠ Запись слишком длинная (макс ~2 мин)');return}
    pushMsg({from:ME_NICK,type:'audio',text:'🎤 Голосовое',data:b64,dur,ts:Date.now(),...(replyMsg?{replyTo:replyMsg}:{})})
      .then(()=>{$('voicebtn').classList.remove('busy');cancelReply();})
      .catch(e=>{$('voicebtn').classList.remove('busy');toast('⚠ '+e.message)});
  };
  reader.onerror=()=>{$('voicebtn').classList.remove('busy');toast('⚠ Ошибка аудио')};
  reader.readAsDataURL(blob);
  recChunks=[];
}

//  MODAL — FIND USER

$('fab').onclick=openModal;
$('modal-x').onclick=closeModal;
$('modal').onclick=e=>{if(e.target===$('modal'))closeModal()};
$('peer-inp').onkeydown=e=>{if(e.key==='Enter')searchUser()};

function openModal(){$('peer-inp').value='';setMS('','');$('modal').classList.add('open');setTimeout(()=>$('peer-inp').focus(),340)}
function closeModal(){$('modal').classList.remove('open')}
function setMS(m,c){const e=$('mst');e.textContent=m;e.className=c}

function searchUser(){
  const raw=$('peer-inp').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!raw){toast('⚠ Введите ник');return}
  if(raw===ME_NICK){toast('⚠ Это ваш собственный ник');return}
  if(contacts.includes(raw)){closeModal();openChat(raw);return}
  setMS('⏳ Поиск…','srch'); $('modal-ok').disabled=true;
  db.ref('users/'+raw).once('value')
    .then(snap=>{
      $('modal-ok').disabled=false;
      if(snap.exists()){
        const d=snap.val(); setMS('✓ @'+raw+' найден!','ok');
        setTimeout(()=>{addContact(raw,d.uid);closeModal()},700);
      }else setMS('✕ @'+raw+' не зарегистрирован','err');
    })
    .catch(e=>{$('modal-ok').disabled=false;setMS('✕ Ошибка: '+e.message,'err')});
}

function addContact(peerNick,peerUid){
  const upd={};
  upd['contacts/'+ME_UID+'/'+peerNick]=peerNick;
  if(peerUid)upd['contacts/'+peerUid+'/'+ME_NICK]=ME_NICK;
  db.ref().update(upd);
  if(!contacts.includes(peerNick)){
    contacts.push(peerNick);
    msgCache[chid(ME_NICK,peerNick)]=[];
    listenMsgs(peerNick); renderList();
  }
  openChat(peerNick); toast('+ @'+peerNick+' добавлен');
}

// ════════════════════════════════════════
//  УДАЛЕНИЕ ЧАТА
// ════════════════════════════════════════
function toggleChatMenu(e, peer){
  e.stopPropagation();
  // Закрыть все другие меню
  document.querySelectorAll('.c-menu.open').forEach(m=>{
    if(m.id!=='cmenu_'+peer) m.classList.remove('open');
  });
  const menu=$('cmenu_'+peer);
  if(menu) menu.classList.toggle('open');
}

function confirmDeleteChat(peer){
  document.querySelectorAll('.c-menu.open').forEach(m=>m.classList.remove('open'));
  if(!confirm('Удалить чат с @'+peer+'?\n\nСообщения удалятся только у вас.')) return;
  deleteChat(peer);
}

function deleteChat(peer){
  // Удаляем только у себя: убираем из contacts и msgCache
  // Отписываемся от Firebase-слушателя
  const ch=chid(ME_NICK,peer);
  if(listeners[ch]){
    db.ref('chats/'+ch+'/msgs').off();
    delete listeners[ch];
  }
  // Убираем из локального contacts
  contacts=contacts.filter(c=>c!==peer);
  delete msgCache[ch];
  delete unread[peer];

  // Удаляем запись контакта в Firebase только у себя
  db.ref('contacts/'+ME_UID+'/'+peer).remove();

  // Если сейчас открыт этот чат — уходим назад
  if(CUR_PEER===peer){ CUR_PEER=''; CUR_CH=''; goTo('chats'); }

  renderList();
  toast('Чат с @'+peer+' удалён');
}

// ════════════════════════════════════════
//  ВЫДЕЛЕНИЕ И УДАЛЕНИЕ СООБЩЕНИЙ
// ════════════════════════════════════════
let selectedMsgs = new Set(); // Set of message IDs
let selectMode   = false;

function enterSelectMode(){
  selectMode = true;
  $('del-toolbar').classList.add('show');
  updateDelCount();
}

function cancelSelect(){
  selectMode = false;
  selectedMsgs.clear();
  $('del-toolbar').classList.remove('show');
  // Снять выделение со всех
  document.querySelectorAll('.mg.selected').forEach(el=>el.classList.remove('selected'));
}

function updateDelCount(){
  $('del-count').textContent = selectedMsgs.size+' выбрано';
}

function toggleMsgSelect(msgId, el){
  if(!selectMode) enterSelectMode();
  if(selectedMsgs.has(msgId)){
    selectedMsgs.delete(msgId);
    el.classList.remove('selected');
  } else {
    selectedMsgs.add(msgId);
    el.classList.add('selected');
  }
  updateDelCount();
  // Если всё снято — выходим из режима выделения
  if(selectedMsgs.size===0) cancelSelect();
}

function deleteSelected(){
  if(selectedMsgs.size===0) return;
  if(!confirm('Удалить '+selectedMsgs.size+' сообщ.?\n\nУдалится только у вас.')) return;

  const ch=CUR_CH;
  // Удаляем из локального кеша
  msgCache[ch]=(msgCache[ch]||[]).filter(m=>!selectedMsgs.has(m.id));

  // Удаляем узлы из DOM
  selectedMsgs.forEach(id=>{
    const el=document.querySelector(`.mg[data-id="${id}"]`);
    if(el) el.remove();
  });

  // Удаляем из Firebase (только свои записи — id из БД)
  // Примечание: удаляем только те сообщения, где from===ME_NICK
  // Чужие сообщения скрываем только локально (удаление из DOM уже сделано выше)
  selectedMsgs.forEach(id=>{
    // Попробуем удалить из Firebase — если не наше, Firebase проигнорирует
    db.ref('chats/'+ch+'/msgs/'+id).remove().catch(()=>{});
  });

  cancelSelect();
  toast('Сообщения удалены');
}
